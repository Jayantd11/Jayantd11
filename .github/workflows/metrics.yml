name: GitHub Metrics

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:          # manual trigger
  push:
    branches: [main]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── Main overview card ───────────────────────────────────────────────
      - name: Metrics (overview)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Jayantd11
          filename: github/metrics.svg
          base: header, activity, community, repositories, metadata
          plugin_lines: yes
          plugin_traffic: yes
          output_action: commit

      # ── Coding habits + commit time histogram ────────────────────────────
      - name: Metrics (habits)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Jayantd11
          filename: github/metrics.habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          output_action: commit

      # ── Isometric contribution calendar ─────────────────────────────────
      - name: Metrics (isocalendar)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Jayantd11
          filename: github/metrics.isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: commit

      # ── Most used languages ──────────────────────────────────────────────
      - name: Metrics (languages)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Jayantd11
          filename: github/metrics.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, dockerfile, makefile, shell
          plugin_languages_limit: 8
          plugin_languages_details: percentage, lines
          plugin_languages_sections: most-used
          output_action: commit

      # ── Mastered topics / tech icons ─────────────────────────────────────
      - name: Metrics (topics)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Jayantd11
          filename: github/metrics.topics.svg
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 30
          plugin_topics_mode: icons
          output_action: commit
